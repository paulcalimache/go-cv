<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CV</title>
        <style>
            @page {
                size: A4;
            }
            body {
                width: 21cm;
                height: 29.7cm;
                margin: 0;
                display: flex;
                font-family: sans-serif;
            }
            .left-section {
                width:30%;
                height:100%;
                background-color: #558ED5;
            }
            .right-section {
                width:70%;
                height:100%;
                display: flex;
                flex-direction: column;
                row-gap: 10px;
                padding: 10px;
            }
            #name {
                text-align: center;
                font-weight: bold;
                font-size: 36px;
                color: #174180;
            }
            #job {
                text-align: center;
                font-size: 16px;
                color: #558ED5;
            }
            .line {
                width:100%;
                height: 2px;
                background-color: #558ED5;
            }
            #education {
                display: flex;
                flex-direction: column;
            }
        </style>
    </head>
    <body>
        <div class="left-section">
        </div>
        <div class="right-section">
            <span id="name">{{.Firstname }} {{.Lastname}}</span>
            <span id="job">{{.Job}}</span>
            <span id="description">{{.Description}}</span>
            <div class="line"></div>
            <div id="education">
                <span>EDUCATION</span>
                {{ range .Education }}
                <span class="timerange">{{ .Timerange }}</span>
                <span class="title">{{ .Title }}</span>
                <span class="institution">{{ .Institution }}</span>
                {{ end }}
            </div>
            <div id="experiences">
                <span>Experiences</span>
                {{ range .Experiences }}
                <span class="timerange">{{ .Timerange }}</span>
                <span class="title">{{ .Title }}</span>
                <span class="company">{{ .Company }}</span>
                <span class="description">{{ .Description }}</span>
                {{ end }}
            </div>
        </div>
    </body>
</html>
